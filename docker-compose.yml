version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_VERSION=1.0.0
      - ENVIRONMENT=development
      - PORT=8080
      - FLASK_ENV=development
      - LOG_LEVEL=DEBUG
    env_file:
      - .env
    volumes:
      - ./app.py:/app/app.py:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

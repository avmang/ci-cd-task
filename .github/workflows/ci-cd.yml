name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches:
      - main


env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: mavoyan-flask-app
  REGISTRY: mavoyan-flask-app-repo
  GKE_CLUSTER: mavoyan-flask-app-cluster
  GKE_ZONE: us-central1
  PYTHON_VERSION: '3.11'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    environment:
      name: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest test_app.py -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build-scan:
    name: Build and Security Scan
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      security-events: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      scan-results: ${{ steps.scan.outputs.results }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SERVICE }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.SERVICE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (table output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.SERVICE }}:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
          output: 'trivy-results.txt'

      - name: Add Trivy results to job summary
        if: always()
        run: |
          echo "## 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.SERVICE }}:${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Vulnerabilities (CRITICAL + HIGH)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f trivy-results.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat trivy-results.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No scan results available" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Detailed results available in [GitHub Security tab](../../security/code-scanning)" >> $GITHUB_STEP_SUMMARY

      - name: Run Trivy vulnerability scanner (SARIF for GitHub Security)
        id: scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.SERVICE }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-staging-gke:
    name: Deploy to Staging (GKE)
    runs-on: ubuntu-latest
    needs: build-scan
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: ${{ steps.get-url.outputs.url }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push to Artifact Registry
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY }}/${{ env.SERVICE }}:staging-${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          docker tag $IMAGE ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY }}/${{ env.SERVICE }}:staging-latest
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY }}/${{ env.SERVICE }}:staging-latest

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GKE_ZONE }} \
            --project ${{ env.GCP_PROJECT_ID }}

      - name: Deploy to GKE
        run: |
          # Create namespace if not exists
          kubectl apply -f k8s/namespace-staging.yaml

          # Image Update
          sed -i "s|gd-gcp-gridu-devops-t1-t2|${{ env.GCP_PROJECT_ID }}|g" k8s/*.yaml
          sed -i "s|COMMIT_SHA|staging-${{ github.sha }}|g" k8s/deployment.yaml
          sed -i "s|:latest|:staging-${{ github.sha }}|g" k8s/deployment.yaml
          sed -i "s|environment: production|environment: staging|g" k8s/deployment.yaml

          kubectl apply -f k8s/serviceaccount.yaml -n staging
          kubectl apply -f k8s/deployment.yaml -n staging
          kubectl apply -f k8s/service.yaml -n staging
          kubectl apply -f k8s/hpa.yaml -n staging

          kubectl rollout status deployment/${{ env.SERVICE }} -n staging --timeout=5m

      - name: Get service URL
        id: get-url
        run: |
          for i in {1..30}; do
            EXTERNAL_IP=$(kubectl get service ${{ env.SERVICE }} -n staging -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            if [ ! -z "$EXTERNAL_IP" ]; then
              echo "url=http://$EXTERNAL_IP" >> $GITHUB_OUTPUT
              echo "Staging Service URL: http://$EXTERNAL_IP"
              break
            fi
            echo "Waiting for LoadBalancer IP... ($i/30)"
            sleep 10
          done

      - name: Health check
        run: |
          sleep 10
          EXTERNAL_IP=$(kubectl get service ${{ env.SERVICE }} -n staging -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          if [ ! -z "$EXTERNAL_IP" ]; then
            curl -f http://$EXTERNAL_IP/health || exit 1
          fi

  deploy-production-gke:
    name: Deploy to Production (GKE)
    runs-on: ubuntu-latest
    needs: deploy-staging-gke
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.get-url.outputs.url }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push to Artifact Registry
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY }}/${{ env.SERVICE }}:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          docker tag $IMAGE ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY }}/${{ env.SERVICE }}:latest
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REGISTRY }}/${{ env.SERVICE }}:latest

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GKE_ZONE }} \
            --project ${{ env.GCP_PROJECT_ID }}

      - name: Deploy to GKE
        run: |
          # Create namespace if not exists
          kubectl apply -f k8s/namespace-production.yaml

          # Image Update
          sed -i "s|gd-gcp-gridu-devops-t1-t2|${{ env.GCP_PROJECT_ID }}|g" k8s/*.yaml
          sed -i "s|COMMIT_SHA|${{ github.sha }}|g" k8s/deployment.yaml
          sed -i "s|:latest|:${{ github.sha }}|g" k8s/deployment.yaml

          kubectl apply -f k8s/serviceaccount.yaml -n production
          kubectl apply -f k8s/deployment.yaml -n production
          kubectl apply -f k8s/service.yaml -n production
          kubectl apply -f k8s/hpa.yaml -n production

          kubectl rollout status deployment/${{ env.SERVICE }} -n production --timeout=5m

      - name: Get service URL
        id: get-url
        run: |
          # Wait for LoadBalancer IP
          for i in {1..30}; do
            EXTERNAL_IP=$(kubectl get service ${{ env.SERVICE }} -n production -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            if [ ! -z "$EXTERNAL_IP" ]; then
              echo "url=http://$EXTERNAL_IP" >> $GITHUB_OUTPUT
              echo "Production Service URL: http://$EXTERNAL_IP"
              break
            fi
            echo "Waiting for LoadBalancer IP... ($i/30)"
            sleep 10
          done

      - name: Health check
        run: |
          sleep 10
          EXTERNAL_IP=$(kubectl get service ${{ env.SERVICE }} -n production -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          if [ ! -z "$EXTERNAL_IP" ]; then
            curl -f http://$EXTERNAL_IP/health || exit 1
          fi

      - name: Deployment success notification
        if: success()
        run: |
          echo "🚀 Production deployment successful!"
          EXTERNAL_IP=$(kubectl get service ${{ env.SERVICE }} -n production -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "URL: http://$EXTERNAL_IP"
          echo "Version: ${{ github.sha }}"

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [test, build-scan, deploy-production-gke]
    if: always()
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.test.result }}" == "failure" || "${{ needs.build-scan.result }}" == "failure" || "${{ needs.deploy-production-gke.result }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.test.result }}" == "success" && "${{ needs.build-scan.result }}" == "success" && "${{ needs.deploy-production-gke.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status=partial" >> $GITHUB_OUTPUT
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
          fi

      - name: Create job summary
        run: |
          echo "## ${{ steps.status.outputs.emoji }} Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.status.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Results" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build & Scan: ${{ needs.build-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy GKE: ${{ needs.deploy-production-gke.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Email Notification
        uses: dawidd6/action-send-mail@v3
        if: always()
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Pipeline status"
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
          body: |
            Pipeline Status: ${{ steps.status.outputs.status }}

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}

            Job Results:
            - Tests: ${{ needs.test.result }}
            - Build & Scan: ${{ needs.build-scan.result }}
            - Deploy to Production: ${{ needs.deploy-production-gke.result }}

            View workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
